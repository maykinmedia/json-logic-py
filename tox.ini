[tox]
envlist =
    clean
    py312
    isort
    black
    flake8

[gh-actions]
python =
    3.12: py312

[testenv]
extras =
    tests
    coverage
commands =
  py.test tests \
  --cov=json_logic --cov-report xml:reports/coverage.xml \
  {posargs}

[testenv:clean]
deps = coverage
commands = coverage erase

[testenv:isort]
deps = isort
skipsdist = True
commands = isort --recursive --check-only --diff ./json_logic/ ./tests/

[testenv:black]
deps = black
skipsdist = True
commands = black --check ./json_logic/ ./tests/

[testenv:flake8]
deps = flake8
basepython = python
commands = flake8 ./json_logic/ ./tests/

